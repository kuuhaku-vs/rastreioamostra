<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Descriptografar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

</head>

<body>

<h2>Descriptografar</h2>

<textarea id="entrada" placeholder="Cole o código" style="width:400px;height:80px"></textarea>

<br><br>

<button onclick="descriptografar()">Descriptografar</button>

<h3>Resultado</h3>

<div id="resultado"></div>

<script>

const chave = "chave_super_secreta";

function descriptografar(){

try{

let texto = document.getElementById("entrada").value.trim();

let bytes = CryptoJS.AES.decrypt(texto, chave);

let dados = bytes.toString(CryptoJS.enc.Utf8);

let obj = JSON.parse(dados);

document.getElementById("resultado").innerHTML =
"Usuário: " + obj.usuario + "<br>Senha: " + obj.senha;

}catch(e){

document.getElementById("resultado").innerHTML = "Erro ao descriptografar";

}

}

</script>

</body>
</html>
