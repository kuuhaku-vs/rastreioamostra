<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rastreamento de Amostras</title>
  <link rel="stylesheet" href="style.css" />
</head>

  
<body>

  <!-- ================= OVERLAY DETALHES ================= -->
  <div id="overlayDetalhes" class="overlay oculto">
    <div class="painel-detalhes">
      <button class="fechar" type="button" onclick="fecharDetalhes()">✕</button>
      <div id="conteudoDetalhes"></div>
    </div>
  </div>

  <div id="overlayNotificacoes" class="overlay oculto">
  <div class="painel-detalhes">
    <button class="fechar" onclick="fecharNotificacoes()">✕</button>
    <h3>Pedidos Pendentes</h3>
    <div id="listaNotificacoes"></div>
  </div>
</div>


  <!-- ================= MODAL LIMPAR ================= -->
  <div id="modalLimpar" class="modal oculto">
    <div class="modal-box">
      <p>Deseja limpar todos os filtros?</p>
      <div class="modal-botoes">
        <button id="confirmarLimpar">Sim</button>
        <button id="cancelarLimpar">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ================= TOPO ================= -->
  
  
  <!-- ================= CONTEÚDO ================= -->
  <main class="container">

    <!-- ================= LOGIN ================= -->

    
   <section id="loginVendedor" class="box-busca">
  <header class="topo">
    <img id="logoMarca" src="Logo - Grupo 4k - Branco.png" class="logo" alt="Logo da empresa" />
  </header>

  <h3 style="text-align:center;color:white;">Login do Vendedor</h3>

 <form id="formLogin">

<input
id="usuarioLogin"
type="text"
placeholder="Usuário Protheus"
required
>

<input
id="senhaLogin"
type="password"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

</div>

  <div id="erroLogin" style="color:#ffeb3b;text-align:center;font-size:13px;"></div>
</section>


</div>
    <!-- ================= SISTEMA ================= -->
    <section id="sistema" class="oculto">

      <!-- ================= TOPO LAYOUT ================= -->
      <section class="topo-layout">

        <!-- ================= BUSCA / INFO ================= -->
        <div class="box-busca oculto" id="boxFiltros">

          <button id="btnNotificacoes" class="btn-notificacao oculto" title="Pedidos pendentes">
  🔔 <span id="contadorNotificacoes" class="badge">0</span>
</button>


  <img
    id="logoMarcaBox"
    class="logo-marca-box"
    alt="Logo da marca"
  />

  <div id="boasVindas" class="boas-vindas"></div>

          <div class="tipo-busca-wrapper">
  <button id="btnTipoBusca" class="btn-tipo-busca" disabled>
    Pesquisar por:
    <strong id="labelTipoBusca">Nota Fiscal</strong>
    <span class="seta">▾</span>
  </button>

  <div id="menuTipoBusca" class="menu-tipo-busca oculto">
    <div class="menu-item ativo" data-tipo="nota">📄 Nota Fiscal</div>
    <div class="menu-item" data-tipo="pedido">📦 Pedido</div>
    <div class="menu-item" data-tipo="cliente">👤 Nº Cliente</div>
    <div class="menu-item" data-tipo="representante">👤 Nº Representante</div>
  </div>

  <!-- mantém o select invisível para não quebrar o JS -->
  <select id="tipoBusca" style="display:none">
    <option value="nota" selected></option>
    <option value="pedido"></option>
    <option value="cliente"></option>
    <option value="representante"></option>
  </select>
</div>


          <input
            id="filtroBusca"
            type="text"
            placeholder="Buscar por Nota Fiscal ou Pedido"
            disabled
          />

          <div id="contador" class="contador"></div>

          <!-- TROCAR VENDEDOR (ÁREA VERMELHA) -->
          <button id="trocarVendedor" type="button" class="oculto trocar-vendedor">
          🔄 Trocar vendedor
          </button>
          <!-- BOTÃO ANALISES (OCULTO POR PADRÃO) -->
          <button id="btnAnalises" class="btn-analises oculto">
            📊 Análises
          </button>



        </div>


        <!-- ================= GRÁFICO ================= -->
        <div id="painelGrafico" class="resumo-card oculto"></div>

      </section>

      <!-- ================= RESULTADOS ================= -->
      <section id="resultado" class="lista-cards oculto"></section>

    </section>

  </main>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="logica.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <div id="alertaTela" class="alerta-tela oculto"></div>
</body>
</html>
